services:
  - type: web
    name: my-flask-portfolio # keep existing Render service name so it redeploys in place
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.6
      - key: ADMIN_KEY
        generateValue: true
